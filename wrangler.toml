name = "mail-free"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

[[d1_databases]]
binding = "mail_free_local"
database_name = "mail-free-local"
database_id = "98d3a9fc-8000-490c-9788-54c0f3727b27"

# Turso/libSQL 连接（数据库 URL 放 vars，Token 请用 wrangler secret 设置）
# 例如：
# wrangler secret put TURSO_AUTH_TOKEN
# wrangler secret put RESEND_API_KEY

# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
TURSO_DATABASE_URL=""
ADMIN_NAME=""
ADMIN_PASSWORD=""
GUEST_PASSWORD="guest"
JWT_TOKEN=""
JWT_TOKENGUEST_PASSWORD=""
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN=""
RESEND_API_KEY=""



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# wrangler.toml (wrangler v3.88.0^) 日志服务
# [observability.logs]
# enabled = true